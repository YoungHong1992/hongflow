name: Bug Report
description: Report a reproducible issue in HongFlow Community.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Node, pnpm, OS, Docker versions.
