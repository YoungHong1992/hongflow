services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hongflow}
      POSTGRES_USER: ${POSTGRES_USER:-hongflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hongflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hongflow} -d ${POSTGRES_DB:-hongflow}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://hongflow:hongflow@postgres:5432/hongflow}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-3001}
      APP_SECRET: ${APP_SECRET:-change-me-in-production}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      UPLOAD_DIR: ${UPLOAD_DIR:-./data/uploads}
      EXPORT_DIR: ${EXPORT_DIR:-./data/exports}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - ./data:/app/data

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://hongflow:hongflow@postgres:5432/hongflow}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      APP_SECRET: ${APP_SECRET:-change-me-in-production}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EXPORT_DIR: ${EXPORT_DIR:-./data/exports}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - ./data:/app/data

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001/api}
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001/api}
      WEB_PORT: ${WEB_PORT:-3000}
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres_data:
  redis_data:
